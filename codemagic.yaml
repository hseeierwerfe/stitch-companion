workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.32.1
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: development      # Kostenlose Apple-ID: auf eigenem Gerät testbar
        bundle_identifier: com.stitch.companion

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Flutter-Abhängigkeiten installieren
        script: |
          flutter pub get

      - name: iOS Pods installieren
        script: |
          cd ios && pod install

      - name: iOS bauen (.ipa)
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      email:
        recipients:
          - hseeierwerfe@example.com      # <-- Hier deine E-Mail eintragen
        notify:
          success: true
          failure: true
